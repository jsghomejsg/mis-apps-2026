<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 GPA & Grade Calculator | Final Grade Predictor</title>
    <meta name="description" content="Free 2026 Grade Calculator. Calculate your GPA and find out what score you need on your final exam. Fast and accurate student tool.">
    
    <meta name="google-site-verification" content="434e69572ce15af6" />

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #fff; padding: 1rem; text-align: center; border-bottom: 4px solid var(--primary); }
        .logo { font-weight: 700; font-size: 1.4rem; color: var(--primary); }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 320px; gap: 2rem; flex: 1; }
        .main-tool { background: var(--card); border-radius: 20px; padding: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .ad-banner { width: 100%; height: 90px; margin-bottom: 2rem; display: flex; justify-content: center; overflow: hidden; }

        .grade-input { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center; }
        input { flex: 1; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        
        .res-display { background: #eff6ff; padding: 1.5rem; border-radius: 15px; text-align: center; margin-top: 1rem; border: 2px dashed var(--primary); }
        .res-val { font-size: 2.8rem; font-weight: 700; color: var(--primary); }

        /* Visitas Dobles */
        .network { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e2e8f0; }
        .n-links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 8px; }
        .n-link { font-size: 0.75rem; color: #64748b; text-decoration: none; padding: 5px 12px; border: 1px solid #e2e8f0; border-radius: 10px; }

        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .cta-student { background: #1e293b; color: #fff; padding: 1.5rem; border-radius: 20px; text-align: center; text-decoration: none; display: block; }
        .btn-study { display: block; background: var(--primary); color: #fff; padding: 12px; border-radius: 10px; font-weight: 700; margin-top: 1rem; text-decoration: none; }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header><div class="logo">STUDENT PRO // 2026</div></header>

<div class="container">
    <main>
        <div class="ad-banner">
            <script type="text/javascript">
                atOptions = {
                    'key' : '318ba4e4eb97e5a697d43fb713f5456e',
                    'format' : 'iframe',
                    'height' : 90,
                    'width' : 728,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="//www.highperformanceformat.com/318ba4e4eb97e5a697d43fb713f5456e/invoke.js"></script>
        </div>

        <div class="main-tool">
            <h3 style="margin-top:0">Final Grade Calculator</h3>
            <p style="font-size: 0.9rem; color: #64748b;">Enter your current grades to find your 2026 GPA.</p>
            
            <div id="inputs">
                <div class="grade-input"><input type="number" class="score" placeholder="Grade (%)" oninput="calc()"> <input type="number" class="weight" placeholder="Weight (%)" oninput="calc()"></div>
                <div class="grade-input"><input type="number" class="score" placeholder="Grade (%)" oninput="calc()"> <input type="number" class="weight" placeholder="Weight (%)" oninput="calc()"></div>
            </div>

            <div class="res-display">
                <div style="font-size: 0.8rem; font-weight: 700; opacity: 0.7;">YOUR CURRENT GRADE:</div>
                <div class="res-val" id="out">0%</div>
            </div>

            <div class="network">
                <div style="font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase;">Student Utilities</div>
                <div class="n-links">
                    <a href="https://jsghomejsg.github.io/mis-apps-2026/calorie-deficit-calculator/" class="n-link">Diet Tool</a>
                    <a href="https://jsghomejsg.github.io/mis-apps-2026/business-name-generator/" class="n-link">Brand Ideas</a>
                    <a href="https://jsghomejsg.github.io/mis-apps-2026/app21/" class="n-link">Inflation Tool</a>
                </div>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <a href="https://www.effectivegatecpm.com/x0sa89dj?key=45fee6aa631e7dbbb3c820358e72eb4e" target="_blank" class="cta-student">
            <h4 style="margin:0">EXAM HELP 2026</h4>
            <p style="font-size: 0.8rem; opacity: 0.8; margin: 10px 0;">Download the Ultimate 2026 Memory & Study Guide for free.</p>
            <span class="btn-study">DOWNLOAD PDF</span>
        </a>
    </aside>
</div>

<script>
    function calc() {
        let scores = document.getElementsByClassName('score');
        let weights = document.getElementsByClassName('weight');
        let total = 0;
        let weightSum = 0;
        for(let i=0; i<scores.length; i++) {
            if(scores[i].value && weights[i].value) {
                total += (scores[i].value * (weights[i].value / 100));
                weightSum += parseFloat(weights[i].value);
            }
        }
        document.getElementById('out').innerText = weightSum > 0 ? Math.round(total) + "%" : "0%";
    }
</script>
</body>
</html>
