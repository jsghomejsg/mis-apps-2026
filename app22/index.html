<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #fff; padding: 1.5rem; text-align: center; border-bottom: 3px solid var(--primary); }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); letter-spacing: -0.5px; }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 320px; gap: 2rem; flex: 1; }

        .ad-slot { width: 100%; height: 90px; margin-bottom: 2rem; text-align: center; overflow: hidden; }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; color: #64748b; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: #f0fdf4; }

        .result-panel { background: #f8fafc; padding: 1.5rem; border-radius: 15px; text-align: center; margin-top: 1.5rem; border: 2px dashed #e2e8f0; }
        .bmi-val { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 0.5rem 0; }
        .bmi-status { font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Red de Visitas Dobles */
        .internal-network { margin-top: 2.5rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem; }
        .n-links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 10px; }
        .n-link { font-size: 0.75rem; color: #64748b; text-decoration: none; padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 20px; }
        .n-link:hover { border-color: var(--primary); color: var(--primary); }

        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .cta-diet { background: #0f172a; color: #fff; padding: 2rem; border-radius: 20px; text-align: center; text-decoration: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .cta-diet strong { display: block; color: var(--primary); font-size: 1.2rem; margin-top: 0.5rem; }
        .btn-action { display: block; background: var(--primary); color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: 800; margin-top: 1.5rem; }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }

</head>
<body>

<header><div class="logo">FITNESS METER 2026</div></header>

<div class="container">
    <main>
        <div class="ad-slot">
            <script type="text/javascript">
                atOptions = {
                    'key' : '318ba4e4eb97e5a697d43fb713f5456e',

            </script>

        </div>

        <div class="main-tool">
            <div class="input-group">
                <label>Weight (kg)</label>
                <input type="number" id="weight" value="75" oninput="calcBMI()">
            </div>
            <div class="input-group">
                <label>Height (cm)</label>
                <input type="number" id="height" value="175" oninput="calcBMI()">
            </div>

            <div class="result-panel">
                <div style="font-size: 0.8rem; font-weight: 700; color: #94a3b8;">YOUR 2026 BMI INDEX:</div>
                <div class="bmi-val" id="bmiOut">24.5</div>
                <div class="bmi-status" id="statusOut">Normal Weight</div>
            </div>

            <div class="internal-network">
                <div style="font-size: 0.7rem; font-weight: 800; color: #94a3b8;">HEALTH & PRODUCTIVITY TOOLS</div>
                <div class="n-links">
                    <a href="https://calorie-calc-2026.pages.dev/" class="n-link">Calorie Deficit</a>

                </div>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <a href="https://www.effectivegatecpm.com/qm4ejz2p?key=f7b0f35d8d24d11b1b75eeb1edddb8cd" target="_blank" class="cta-diet">
            LOSE WEIGHT FAST IN 2026
            <strong>GET YOUR PERSONALIZED DIET PLAN</strong>
            <span class="btn-action">START AUDIT NOW</span>
        </a>
    </aside>
</div>

<script>
    function calcBMI() {
        const w = document.getElementById('weight').value;
        const h = document.getElementById('height').value / 100;
        if(w && h) {
            const bmi = (w / (h * h)).toFixed(1);
            document.getElementById('bmiOut').innerText = bmi;
            let status = "";
            if(bmi < 18.5) status = "Underweight";
            else if(bmi < 25) status = "Normal Weight";
            else if(bmi < 30) status = "Overweight";
            else status = "Obesity";
            document.getElementById('statusOut').innerText = status;
        }
    }
    calcBMI();
</script>
</body>
</html>
